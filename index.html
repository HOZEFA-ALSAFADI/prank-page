<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>🔐 فحص أمني شامل</title>
    <style>
        body {
            background-color: black;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            text-align: center;
            padding: 50px;
        }
        .hack-text {
            font-size: 20px;
            white-space: pre-line;
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            50% { opacity: 0; }
        }
        .done {
            color: #ffaa00;
            font-size: 28px;
            margin-top: 30px;
            font-weight: bold;
        }
        .warning {
            color: #ff3333;
            font-size: 20px;
            margin-top: 40px;
            border-top: 2px solid #ff3333;
            padding-top: 20px;
            background-color: #1a1a1a;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="loader">🔍 جاري فحص النظام...</div>

    <script>
        const messages = [
            "🚀 فتح منفذ 443 للمراقبة...",
            "📡 جاري الاتصال بقاعدة البيانات المركزية...",
            "🛡️ فحص الثغرات الأمنية (CVE-2024-XXXX)...",
            "🧠 تحليل سلوك الجهاز...",
            "🔐 تأمين الاتصال باستخدام TLS 1.3...",
            "📂 جارٍ سحب الملفات وتحليل البيانات...",
            "✅ لم يتم العثور على تهديدات!",
            "🎉 جهازك آمن بنسبة 100%."
        ];
        let index = 0;
        const loaderDiv = document.getElementById("loader");

        function showNextMessage() {
            if (index < messages.length) {
                loaderDiv.innerHTML = messages[index];
                index++;
                setTimeout(showNextMessage, 1500);
            } else {
                loaderDiv.innerHTML = "";
                const finalMessage = document.createElement("div");
                finalMessage.className = "done";
                finalMessage.innerHTML = "🔒 تم فحص جهازك بنجاح<br>---<br>هذه رسالة أمان من مهندس الأمن السيبراني:<br>HOZEFA ALSafadi<br>---<br>";
                document.body.appendChild(finalMessage);
                
                const warningMessage = document.createElement("div");
                warningMessage.className = "warning";
                warningMessage.innerHTML = "⚠️ تنبيه أمني ⚠️<br><br>كان هذا مقلبًا تقنيًا من مهندس الأمن الهجومي: حذيفة<br><br>📌 لا تثق في أي رابط أو ملف من مصادر غير موثوقة<br>📌 تحقق دائمًا من مصدر الروابط قبل الضغط عليها<br>📌 استخدم برامج مكافحة الفيروسات والتحديثات الأمنية<br><br>💡 تعلم معنا: الأمن السيبراني يبدأ بالتوعية";
                document.body.appendChild(warningMessage);
            }
        }
        showNextMessage();
    </script>
</body>
</html>
